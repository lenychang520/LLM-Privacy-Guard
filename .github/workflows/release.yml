name: Build Release

# Trigger: push a tag like v2.1.1
# The .exe is ONLY in the GitHub Release — never committed to the repo.

on:
  push:
    tags: ["v*"]

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write  # needed to upload release assets

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml pyinstaller
          pip install -e .

      - name: Build with PyInstaller (AV-safe: no UPX, no obfuscation)
        run: |
          $ver = "${{ github.ref_name }}" -replace '^v', ''
          $commit = "${{ github.sha }}"
          # Build 4-element file version: "2.1.1" -> (2, 1, 1, 0)
          $filevers = "($($ver -replace '\.', ', '), 0)"

          # Version info file — embeds proper Windows metadata into the .exe
          @"
          VSVersionInfo(
            ffi=FixedFileInfo(
              filevers=$filevers,
              prodvers=$filevers,
              mask=0x3f,
              flags=0x0,
              OS=0x40004,
              fileType=0x1,
              subtype=0x0,
              date=(0, 0),
            ),
            kids=[
              StringFileInfo([
                StringTable(
                  u"040904B0",
                  [
                    StringStruct(u"CompanyName", u"LLM Privacy Guard"),
                    StringStruct(u"FileDescription", u"Local sensitive-data filter proxy"),
                    StringStruct(u"FileVersion", u"$ver"),
                    StringStruct(u"InternalName", u"privacy-guard"),
                    StringStruct(u"LegalCopyright", u"Apache 2.0 — github.com/lenychang520/llm-privacy-guard"),
                    StringStruct(u"OriginalFilename", u"privacy-guard.exe"),
                    StringStruct(u"ProductName", u"LLM Privacy Guard"),
                    StringStruct(u"ProductVersion", u"$ver"),
                    StringStruct(u"BuildCommit", u"$commit"),
                  ]
                ),
              ]),
              VarFileInfo([VarStruct(u"Translation", [0x0409, 1200])]),
            ]
          )
          "@ | Out-File -Encoding utf8 version.txt

          pyinstaller `
            --onefile `
            --noupx `
            --strip `
            --name privacy-guard `
            --console `
            --clean `
            --version-file version.txt `
            --add-data "privacy_engine;privacy_engine" `
            --hidden-import yaml `
            --exclude-module tkinter `
            --exclude-module unittest `
            --exclude-module test `
            --exclude-module setuptools `
            --exclude-module email `
            cli.py

      - name: Generate SHA256 checksum
        run: |
          $hash = (Get-FileHash -Algorithm SHA256 dist\privacy-guard.exe).Hash
          "SHA256: $hash" | Out-File -Encoding utf8 dist\checksum.txt
          Write-Host "SHA256: $hash"

      - name: Package release archive
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          $dist = "privacy-guard-v${version}-windows"

          mkdir $dist
          copy dist\privacy-guard.exe $dist\
          copy dist\checksum.txt $dist\
          copy installer\install.ps1 $dist\
          copy installer\uninstall.ps1 $dist\
          copy README.md $dist\README.txt

          Compress-Archive -Path $dist\* -DestinationPath "$dist.zip"

          # Signing placeholder: if you get a code-signing cert, add:
          # signtool sign /fd SHA256 /a /tr http://timestamp.digicert.com $dist\privacy-guard.exe

          Compress-Archive -Path $dist\* -DestinationPath "$dist.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ github.ref_name }}"
          body: |
            ## Windows Release

            1. Download `privacy-guard-v${{ github.ref_name }}-windows.zip`
            2. Extract to a folder (e.g. `C:\Program Files\PrivacyGuard`)
            3. Right-click `install.ps1` → Run with PowerShell (as Administrator)
            4. Follow the prompts

            The installer will:
            - Create a Windows Service that auto-starts on boot
            - Configure auto-recovery so the proxy restarts if killed
            - Run `privacy-guard setup` to detect and configure your tools

            ### Antivirus Notice

            This .exe is built from 100% open-source Python code with **no UPX packing,
            no obfuscation, no compression** — nothing that malware uses to hide.

            **If Windows Defender or SmartScreen flags it:**
            1. Verify the SHA256 checksum matches `checksum.txt`
            2. The source and CI build logs are public — inspect them on GitHub
            3. Add `C:\Program Files\PrivacyGuard` to Defender exclusions
            4. [Submit to Microsoft](https://www.microsoft.com/en-us/wdsi/filesubmission) for review (free, takes 24-48h)

            As more users install it, Microsoft's reputation system will stop flagging it.

            ## Other platforms
            ```bash
            pip install llm-privacy-guard==${{ github.ref_name }}
            privacy-guard setup
            ```
          files: privacy-guard-v*.zip
          generate_release_notes: false
